<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>LibBot</title>
    <link rel="stylesheet" href="style.css">
    <<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js">
        </script>
        <!-- Optional: To prevent XSS if you don't trust the LLM output entirely -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
</head>

<body class="light">

    <header class="header">
        <a href="https://datalab.ucdavis.edu/" target="_blank">
            <img id="logo" src="assets/datalab-logo-black.svg" alt="LibBot Logo" class="logo">
        </a>
        <button id="mode-toggle" class="mode-toggle-fixed">🌙 Dark Mode</button>
    </header>

    <!-- Welcome screen (shown on first load) -->
    <div id="welcome-screen" class="welcome-screen">
        <h1 class="welcome-title">Welcome to</h1>
        <img id="welcome-logo" src="assets/logo-light-transparent.svg" alt="LibBot Logo" class="welcome-logo">
        <p class="welcome-subtitle">Type your first question to begin.</p>
    </div>

    <!-- Chat interface (hidden until first message) -->
    <main id="chat-main" class="chat-wrapper hidden">
        <div id="chat-box" class="chat-box"></div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off" />
            <button onclick="sendMessage()">Send</button>
        </div>
        <p class="disclaimer">LibBot is AI-powered and can make mistakes. Use your own judgment when evaluating
            responses.</p>
    </main>

    <!-- Input area shown on welcome screen too -->
    <div id="welcome-input" class="welcome-input-area">
        <input type="text" id="welcome-user-input" placeholder="Type your message..." autocomplete="off" />
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        // Set options for Marked to be more "Gfm" (GitHub Flavored Markdown) friendly
        marked.setOptions({
            breaks: true, // Adds <br> on single line breaks (very important for chat)
            gfm: true
        });
    </script>
    <script src="script.js"></script>
    <script src="script.js"></script>
</body>

</html>
